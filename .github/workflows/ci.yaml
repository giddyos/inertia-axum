on: [push, pull_request]

permissions:
  contents: read

name: CI

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo test --workspace --all-features
      - run: cargo check --workspace --all-targets --all-features
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test
        env:
          INSTA_UPDATE: "no"
        run: cargo test --locked --workspace --all-targets
      - name: Reject uncommitted snapshots
        run: |
          if find . -name '*.snap.new' -print -quit | grep -q .; then
            echo "Pending Insta snapshots were generated:"
            find . -name '*.snap.new' -print
            exit 1
          fi
      - run: cargo test --workspace --doc
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: cargo package -p inertia-axum-macros
      - name: Package runtime against the unpublished workspace macro
        run: cargo --config 'patch.crates-io.inertia-axum-macros.path="crates/inertia-axum-macros"' package -p inertia-axum
      - name: Package test crate against unpublished workspace packages
        run: cargo --config 'patch.crates-io.inertia-axum.path="crates/inertia-axum"' --config 'patch.crates-io.inertia-axum-macros.path="crates/inertia-axum-macros"' package -p inertia-axum-test
      - run: cargo package -p cargo-inertia
      - run: cargo bench --workspace --no-run
      - run: cargo check --workspace --all-targets --no-default-features

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo check --workspace --all-targets

  example:
    name: Frontend example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            examples/axum-svelte/svelte-app/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
        working-directory: examples/axum-svelte/svelte-app
      - run: pnpm test
        working-directory: examples/axum-svelte/svelte-app
      - run: cargo test --workspace

  live-ssr:
    name: Live SSR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: examples/axum-svelte/svelte-app/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
        working-directory: examples/axum-svelte/svelte-app
      - run: pnpm build
        working-directory: examples/axum-svelte/svelte-app
      - run: cargo test -p inertia-axum --features ssr,live-ssr --test ssr_managed_node
