on: [push, pull_request]

name: CI

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        env:
          INSTA_UPDATE: "no"
        run: cargo test --workspace --all-targets
      - name: Reject uncommitted snapshots
        run: |
          if find tests -name '*.snap.new' -print -quit | grep -q .; then
            echo "Pending Insta snapshots were generated:"
            find tests -name '*.snap.new' -print
            exit 1
          fi
      - run: cargo test --workspace --doc
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: cargo package -p inertia-axum
      - run: cargo bench --workspace --no-run

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo check --workspace --all-targets

  example:
    name: Frontend example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            examples/axum-svelte/svelte-app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: examples/axum-svelte/svelte-app
      - run: npm run build
        working-directory: examples/axum-svelte/svelte-app
      - run: cargo test --workspace
