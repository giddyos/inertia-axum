name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_LOCKED: "1"
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  INSTA_UPDATE: "no"
  PNPM_CONFIG_DANGEROUSLY_ALLOW_ALL_BUILDS: "true"

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - run: mise run ci:docs

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - name: Cache Cargo dependencies and build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: stable
          workspaces: ". -> target"
          cache-on-failure: true
      - run: mise run ci:rust

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - name: Cache MSRV Cargo dependencies and build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: msrv-1.88
          workspaces: ". -> target"
          cache-on-failure: true
      - run: mise run ci:msrv

  frontend-build:
    name: Frontend build (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: axum-svelte
            frontend: svelte-app
          - crate: axum-react
            frontend: react-app
          - crate: axum-vue
            frontend: vue-app
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - run: mise run ci:frontend -- "${{ matrix.crate }}" "${{ matrix.frontend }}"

  ssr-node-lifecycle:
    name: Managed Node lifecycle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - name: Restore stable Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: stable
          workspaces: ". -> target"
          save-if: false
      - run: mise run ci:ssr-node-lifecycle

  production-example:
    name: Production example SSR (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: axum-svelte
            frontend: svelte-app
          - crate: axum-react
            frontend: react-app
          - crate: axum-vue
            frontend: vue-app
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - name: Restore stable Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: stable
          workspaces: ". -> target"
          save-if: false
      - run: mise run ci:production --example-only "${{ matrix.crate }}"

  browser-smoke:
    name: Browser hydration smoke (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: axum-svelte
            frontend: svelte-app
          - crate: axum-react
            frontend: react-app
          - crate: axum-vue
            frontend: vue-app
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.5
          install: true
          cache: true
      - name: Restore stable Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: stable
          workspaces: ". -> target"
          save-if: false
      - run: mise run ci:browser -- "${{ matrix.crate }}" "${{ matrix.frontend }}"
