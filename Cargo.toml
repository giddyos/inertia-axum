[package]
name = "axum-inertia"
version = "0.4.0"
edition = "2021"
rust-version = "1.88"
license = "MIT"
homepage = "https://github.com/giddyos/axum-inertia"
repository = "https://github.com/giddyos/axum-inertia"
description = "Inertia.js adapter for Axum"
keywords = ["inertia", "web", "framework", "axum"]
categories = ["web-programming"]
readme = "README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
axum = "0.8.9"
fluent-uri = "0.4.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tower = { version = "0.5.3", features = ["util"] }
tracing = "0.1"

[dev-dependencies]
insta = { version = "1.48.0", features = ["json"] }
tokio = { version = "1", features = ["macros", "rt"] }
