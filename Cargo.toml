[package]
name = "inertia-axum"
version = "0.5.0"
edition = "2021"
rust-version = "1.88"
license = "MIT"
homepage = "https://github.com/giddyos/inertia-axum"
repository = "https://github.com/giddyos/inertia-axum"
description = "Inertia.js adapter for Axum"
keywords = ["inertia", "web", "framework", "axum"]
categories = ["web-programming"]
readme = "README.md"

[workspace]
resolver = "2"
members = [
    "examples/axum-minimal",
    "examples/axum-svelte",
]
default-members = ["."]

[workspace.dependencies]
axum = { version = "0.8.9", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1"
tower = "0.5.3"

[dependencies]
axum = { workspace = true, features = ["json", "original-uri"] }
fluent-uri = "0.4.1"
pin-project-lite = "0.2"
serde = { workspace = true, features = ["rc"] }
serde_json.workspace = true
tower-layer = "0.3"
tower-service = "0.3"
tracing = "0.1"

[dev-dependencies]
axum = { workspace = true, features = ["http1", "tokio"] }
criterion = "0.5"
insta = { version = "1.48.0", features = ["json"] }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
tower = { workspace = true, features = ["util"] }

[[bench]]
name = "request_context"
harness = false

[[bench]]
name = "page_render"
harness = false

[[bench]]
name = "shared_props"
harness = false

[[bench]]
name = "version_layer"
harness = false

[[bench]]
name = "pending_page_finalize"
harness = false
